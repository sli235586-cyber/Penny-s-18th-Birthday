<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Card for Penny</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f7c600; /* 亮黄色 */
            font-family: Futura, Arial, sans-serif;
        }

        .card {
            background: #f7c600;
            padding: 60px;
            max-width: 700px;
        }

        .text {
            color: #e6005c; /* 玫红色 */
            font-size: 65px;
            line-height: 1.8;
        }

        .signature {
            margin-top: 40px;
            text-align: right;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="text">
            Dear Penny,<br><br>

            Happy 18th birthday!<br><br>

            <div class="signature">
                Sophie<br>
                Apr. 10th. 2026
            </div>
        </div>
    </div>
</body>
</html>
